<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0d11" />
    <title>Profit Navigator Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top right, rgba(34, 197, 94, 0.12), transparent 28%),
          linear-gradient(180deg, #0f1218 0%, #090b10 100%);
        color: #eef2e6;
        font: 16px/1.5 Inter, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 560px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 28px;
        padding: 28px;
        background: rgba(18, 22, 30, 0.94);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 5vw, 40px);
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: rgba(238, 242, 230, 0.72);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 18px;
        border: 1px solid rgba(34, 197, 94, 0.28);
        border-radius: 999px;
        padding: 8px 12px;
        background: rgba(34, 197, 94, 0.12);
        color: #8df2a6;
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">Modo offline</div>
      <h1>Profit Navigator indisponivel sem conexao.</h1>
      <p>
        Abra novamente quando a internet voltar. Se o app ja tiver sido aberto antes, a pagina
        principal deve continuar carregando a partir do cache local.
      </p>
    </main>
  </body>
</html>
